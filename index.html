<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POKEMON Fan Log</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background-color: black;
      color: #eee;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 2px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: #fff;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .intro {
      margin-bottom: 30px;
      line-height: 1.6;
      color: #ccc;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      border-left: 4px solid #888;
      padding-left: 10px;
      margin-bottom: 15px;
    }

    .post {
      margin-bottom: 15px;
      padding: 10px;
      background-color: black;
      border-radius: 5px;
    }

    .post a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
    }

    .post p {
      margin: 5px 0 0;
      font-size: 13px;
      color: #aaa;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #333;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

  <header>
    <h1>NARUTO Fan Log</h1>
    <nav>
      <a href="index.html">HOME</a>
      <a href="blog.html">BLOG</a>
      <a href="gallery.html">GALLERY</a>
      <a href="about.html">ABOUT</a>
    </nav>
  </header>

  <div class="container">

    <div class="intro">
      <p>
        このサイトは『ポケモン』について、好きなことを自由に語るための場所です。<br>
        正しい解釈とかじゃなくて、「ここ好き」「なんか分からないけど良い」を大事にしてます。
      </p>
    </div>

    <div class="section">
      <h2>Latest Posts</h2>

      <div class="post">
        <a href="blog.html">第○話のこのシーンが好きすぎる</a>
        <p>感情がぐちゃぐちゃになるやつ</p>
      </div>

      <div class="post">
        <a href="blog.html">この表情なんなんだろう</a>
        <p>分からないけどめちゃくちゃ好き</p>
      </div>

    </div>

    <div class="section">
      <h2>Illustration</h2>

      <div class="gallery">
        <img src="imag1" alt="">
        <img src="img2.jpg" alt="">
        <img src="img3.jpg" alt="">
      </div>

    </div>

  </div>

  <footer>
    <p>© Fan Log</p>
  </footer>

</body>
</html>
